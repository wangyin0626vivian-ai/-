<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小勇者的AI冒险地图</title>
    <style>
        /* 核心布局：确保按钮是大的，且竖着排 */
        body { 
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0; padding: 20px; color: #2c3e50;
            display: flex; flex-direction: column; align-items: center;
        }

        .status-bar { 
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px; border-radius: 50px;
            display: flex; gap: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: 3px solid #fff;
        }
        .stat { font-size: 22px; font-weight: bold; }

        /* 岛屿卡片：确保宽度和垂直排列 */
        .island { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            margin: 15px 0; padding: 25px;
            width: 90%; max-width: 450px; /* 限制宽度，防止太扁 */
            border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid #fff;
            box-sizing: border-box; /* 防止边框撑破容器 */
        }

        .island h2 { margin: 0 0 15px 0; color: #27ae60; font-size: 22px; text-align: center; }

        /* 按钮：强制竖着排列，且足够宽 */
        .quest-btn {
            display: block; /* 核心：确保每个按钮独占一行 */
            width: 100%; 
            padding: 18px; margin: 12px 0;
            background: #fff; border: none; border-radius: 15px;
            font-size: 18px; font-weight: bold; color: #555;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 6px 0 #bdc3c7;
            text-align: center;
        }

        .quest-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #bdc3c7; }
        .completed { background: #2ecc71 !important; color: white !important; box-shadow: 0 3px 0 #27ae60 !important; }

        .boss-island { background: linear-gradient(135deg, #ff7675 0%, #d63031 100%); color: white; border: 4px solid #fff; }
        .boss-island h2 { color: white; }

        /* 弹窗 */
        #parent-lock {
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); 
            background:white; padding:30px; border-radius:25px; z-index:100; text-align:center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 80%; max-width: 300px;
        }
        #mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:99; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="stat">⭐ 经验: <span id="exp">0</span></div>
        <div class="stat">💰 金币: <span id="coins">0</span></div>
    </div>

    <div class="island">
        <h2>🌅 早晨冒险岛</h2>
        <button class="quest-btn" onclick="doQuest(this, 10)">☀️ 拉伸10分钟</button>
        <button class="quest-btn" onclick="doQuest(this, 10)">📖 晨读15分钟</button>
        <button class="quest-btn" onclick="doQuest(this, 10)">🎧 听英语15分钟</button>
    </div>

    <div class="island">
        <h2>🍱 中午任务岛</h2>
        <button class="quest-btn" onclick="doQuest(this, 10)">🔢 计算10分钟</button>
        <button class="quest-btn" onclick="doQuest(this, 10)">🇬🇧 英语周周学</button>
        <button class="quest-btn" onclick="doQuest(this, 10)">✍️ 练字15分钟</button>
    </div>

    <div class="island">
        <h2>🌙 晚上安息岛</h2>
        <button class="quest-btn" onclick="doQuest(this, 10)">📝 课内作业完成</button>
        <button class="quest-btn" onclick="doQuest(this, 10)">📚 睡前晚读20分钟</button>
    </div>

    <div class="island" style="background: rgba(255, 235, 59, 0.9);">
        <h2 style="color: #d35400;">🚀 进阶实验室 (选做)</h2>
        <button class="quest-btn" onclick="doQuest(this, 20)">📖 自主阅读30min</button>
        <button class="quest-btn" onclick="doQuest(this, 20)">🏃 运动半小时</button>
        <button class="quest-btn" onclick="doQuest(this, 30)">🤖 AI探索学习</button>
    </div>

    <div class="island boss-island">
        <h2>👾 周日终极副本</h2>
        <p style="text-align:center;">任务：用 AI 做一个小应用</p>
       <p style="text-align:center;">任务：帮妈妈做一道菜</p>
        <button id="boss-btn" class="quest-btn" onclick="callNPC()">⚔️ 召唤大祭司</button>
    </div>

    <div id="mask" onclick="closeModal()"></div>
    <div id="parent-lock">
        <h3>🔮 大祭司授权</h3>
        <p>口令：888</p>
        <input type="password" id="magic-word" style="padding:10px; border-radius:10px; width:80%; font-size:18px;">
        <button onclick="checkMagic()" style="padding:10px 30px; margin-top:15px; background:#3498db; color:white; border:none; border-radius:10px; width:100%;">确认授权</button>
    </div>

    <!-- 稳定音频源 -->
    <audio id="sound-complete" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sound-boss" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        let totalExp = 0;
        let totalCoins = 0;

        function doQuest(btn, val) {
            if (!btn.classList.contains('completed')) {
                btn.classList.add('completed');
                btn.innerText = "✅ " + btn.innerText;
                
                // 解决部分声音不响：先暂停再播放，重置音频状态
                const sound = document.getElementById('sound-complete');
                sound.pause();
                sound.currentTime = 0;
                sound.play().catch(e => console.log("请先点击页面任意处以激活声音"));
                
                totalExp += val;
                totalCoins += (val * 2);
                updateDisplay();
            }
        }

        function callNPC() {
            document.getElementById('parent-lock').style.display = 'block';
            document.getElementById('mask').style.display = 'block';
        }

        function checkMagic() {
            if (document.getElementById('magic-word').value === "888") {
                document.getElementById('sound-boss').play();
                closeModal();
                const b = document.getElementById('boss-btn');
                b.classList.add('completed');
                b.innerText = "🏆 关卡全通！";
                totalExp += 100; totalCoins += 200;
                updateDisplay();
            } else { alert("口令不对哦！"); }
        }

        function closeModal() {
            document.getElementById('parent-lock').style.display = 'none';
            document.getElementById('mask').style.display = 'none';
        }

        function updateDisplay() {
            document.getElementById('exp').innerText = totalExp;
            document.getElementById('coins').innerText = totalCoins;
        }
    </script>
</body>
</html>
